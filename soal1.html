<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
</head>
<body>
    <div class="calculator">
        <h1>Kalkulator Sederhana</h1>
        
        <form id="calculatorForm">
            <div class="input-group">
                <label for="angka1">Angka Pertama</label>
                <input type="number" id="angka1" placeholder="Masukkan angka" required>
            </div>
            
            <div class="input-group">
                <label for="angka2">Angka Kedua</label>
                <input type="number" id="angka2" placeholder="Masukkan angka" required>
            </div>
            
            <div class="operator-group">
                <label>Pilih Operasi</label>
                <div class="operator-buttons">
                    <button type="button" class="operator-btn" data-operator="*">Kali (×)</button>
                    <button type="button" class="operator-btn" data-operator="/">Bagi (÷)</button>
                </div>
            </div>
            
            <div class="button-group">
                <button type="submit" class="btn-hitung">Hitung</button>
            </div>
        </form>
        
        <div class="result" id="result">
            <div class="result-label">Hasil</div>
            <div class="result-value" id="resultValue"></div>
        </div>
    </div>
    
    <script src="soal1.js"></script>
</body>
</html>
